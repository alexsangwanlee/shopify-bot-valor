appId: com.antigravity.shopifybot
productName: Antigravity Shopify Bot

directories:
  output: release

asar: true

files:
  - dist-electron/**/*
  - dist/renderer/**/*
  - package.json

win:
  signAndEditExecutable: false
  target:
    - nsis

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  shortcutName: Antigravity Shopify Bot
